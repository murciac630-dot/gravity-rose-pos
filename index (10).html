<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Rose - POS Conectado</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { rose: { 500: '#f43f5e', 600: '#e11d48', 900: '#881337' } } }
            }
        }
    </script>
</head>
<body class="bg-gray-950 text-white min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        const { useState, useEffect } = React;

        // 1. Importaciones Modulares de Firebase vía CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // 2. Configuración de Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyB8Ei-GTiqedjsFy09XVujGb94mzkBmVOU",
            authDomain: "ferco-farma.firebaseapp.com",
            projectId: "ferco-farma",
            storageBucket: "ferco-farma.firebasestorage.app",
            messagingSenderId: "974529589553",
            appId: "1:974529589553:web:cde7736964de2e52514010",
            measurementId: "G-FP8LY580F3"
        };

        // 3. Inicialización de Servicios
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        function App() {
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [loading, setLoading] = useState(true); // Estado para la carga de datos

            // 4. Hook para leer Firestore al cargar la app
            useEffect(() => {
                const fetchProducts = async () => {
                    try {
                        const querySnapshot = await getDocs(collection(db, "products"));
                        const productsData = querySnapshot.docs.map(doc => ({
                            id: doc.id,
                            ...doc.data()
                        }));
                        setProducts(productsData);
                    } catch (error) {
                        console.error("Error obteniendo inventario: ", error);
                        // Fallback temporal si la colección "products" aún no existe en Firebase
                        setProducts([
                            { id: 1, name: "Buchanan's (Fallback)", category: "Licores", price: 320000 },
                            { id: 2, name: "Aguardiente (Fallback)", category: "Licores", price: 140000 }
                        ]);
                    } finally {
                        setLoading(false);
                    }
                };

                fetchProducts();
            }, []);

            const formatPrice = (price) => {
                return new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP', maximumFractionDigits: 0 }).format(price);
            };

            const addToCart = (product) => {
                setCart(prevCart => {
                    const existing = prevCart.find(item => item.id === product.id);
                    if (existing) {
                        return prevCart.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item);
                    }
                    return [...prevCart, { ...product, qty: 1 }];
                });
            };

            const total = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

            const exportToExcel = () => {
                if (cart.length === 0) return alert("No hay ventas para exportar.");
                
                const dataToExport = cart.map(item => ({
                    Producto: item.name,
                    Categoría: item.category,
                    Cantidad: item.qty,
                    "Precio Unitario": item.price,
                    Subtotal: item.price * item.qty
                }));

                dataToExport.push({ Producto: "TOTAL JORNADA", Categoría: "", Cantidad: "", "Precio Unitario": "", Subtotal: total });

                const worksheet = XLSX.utils.json_to_sheet(dataToExport);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Cierre Ventas");
                XLSX.writeFile(workbook, "Cierre_Gravity_Rose.xlsx");
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    <div className="w-2/3 p-6 overflow-y-auto">
                        <h1 className="text-3xl font-bold mb-8 text-rose-500">Gravity Rose - POS</h1>
                        <h2 className="text-xl mb-4 border-b border-gray-700 pb-2">Catálogo desde Firestore</h2>
                        
                        {/* Indicador de Carga */}
                        {loading ? (
                            <div className="text-gray-400 animate-pulse">Conectando con Ferco Farma Firestore...</div>
                        ) : (
                            <div className="grid grid-cols-3 gap-4">
                                {products.map(product => (
                                    <button 
                                        key={product.id}
                                        onClick={() => addToCart(product)}
                                        className="bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-lg p-4 text-left transition-colors flex flex-col justify-between h-32 active:scale-95"
                                    >
                                        <span className="text-gray-400 text-sm">{product.category || 'Sin categoría'}</span>
                                        <span className="font-semibold text-lg truncate w-full">{product.name}</span>
                                        <span className="text-rose-400 font-bold">{formatPrice(product.price)}</span>
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>

                    <div className="w-1/3 bg-gray-900 p-6 flex flex-col border-l border-gray-800">
                        <h2 className="text-2xl font-bold mb-6">Cuenta Abierta</h2>
                        <div className="flex-1 overflow-y-auto mb-4 border border-gray-800 rounded-lg bg-gray-950 p-4">
                            {cart.length === 0 ? (
                                <p className="text-gray-500 text-center mt-10">No hay productos en la cuenta.</p>
                            ) : (
                                cart.map(item => (
                                    <div key={item.id} className="flex justify-between items-center mb-4 pb-2 border-b border-gray-800 last:border-0">
                                        <div>
                                            <p className="font-semibold">{item.name}</p>
                                            <p className="text-sm text-gray-400">{formatPrice(item.price)} x {item.qty}</p>
                                        </div>
                                        <p className="font-bold">{formatPrice(item.price * item.qty)}</p>
                                    </div>
                                ))
                            )}
                        </div>
                        <div className="mt-auto">
                            <div className="flex justify-between items-center text-2xl font-bold mb-6">
                                <span>TOTAL</span>
                                <span className="text-rose-500">{formatPrice(total)}</span>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <button onClick={() => setCart([])} className="p-4 rounded-lg bg-gray-800 text-white font-bold hover:bg-gray-700">
                                    Limpiar
                                </button>
                                <button className="p-4 rounded-lg bg-rose-600 text-white font-bold hover:bg-rose-500" onClick={() => alert('Pendiente: Escribir transacción en Firestore')}>
                                    Cobrar
                                </button>
                            </div>
                            <button onClick={exportToExcel} className="w-full mt-4 p-4 rounded-lg bg-emerald-600 text-white font-bold hover:bg-emerald-500 transition-colors">
                                Descargar Cierre (Excel)
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
